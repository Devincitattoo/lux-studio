name: Scheduled Workflow Checks

on:
  schedule:
    # Run discovery cycle every 30 minutes
    - cron: '*/30 * * * *'
    # Run reply checks every 5 minutes
    - cron: '*/5 * * * *'

jobs:
  scheduled-discovery:
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/30 * * * *'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run discovery cycle
        env:
          LIVE_DISCOVERY: ${{ secrets.LIVE_DISCOVERY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run run-once

  scheduled-reply-check:
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/5 * * * *'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check replies
        env:
          LIVE_REPLIES: ${{ secrets.LIVE_REPLIES }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run run-once
